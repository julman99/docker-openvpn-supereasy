name: release

on:
  push:
    branches: [master]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release tag
        id: versions
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)
          OPENVPN_RAW=$(grep -oE 'openvpn=\S+' Dockerfile | head -n1 | cut -d= -f2 | tr -d ' \\')
          OPENVPN=${OPENVPN_RAW%-r*}
          TAG="v${VERSION}-openvpn-${OPENVPN}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image_version=${VERSION}-openvpn-${OPENVPN}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.versions.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.tag_check.outputs.exists == 'false'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/386
          push: true
          tags: |
            julman99/openvpn-supereasy:${{ steps.versions.outputs.image_version }}
            julman99/openvpn-supereasy:latest

      - name: Create and push git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.versions.outputs.tag }}"
          git push origin "${{ steps.versions.outputs.tag }}"
